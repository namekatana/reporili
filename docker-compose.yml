services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - ENVIRONMENT=production
      - PROXY_SECRET=${PROXY_SECRET}
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL:-}
        PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-https://reporili.tech}
        PUBLIC_GITHUB_URL: ${PUBLIC_GITHUB_URL:-https://github.com/namekatana/reporili}
        PUBLIC_GOOGLE_SITE_VERIFICATION: ${PUBLIC_GOOGLE_SITE_VERIFICATION:-}
    restart: unless-stopped
    environment:
      - PROXY_SECRET=${PROXY_SECRET}
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend
