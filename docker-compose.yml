services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - ENVIRONMENT=production
      - PROXY_SECRET=${PROXY_SECRET}
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    environment:
      - PROXY_SECRET=${PROXY_SECRET}
    ports:
      - "80:80"
    depends_on:
      - backend
